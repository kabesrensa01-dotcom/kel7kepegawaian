<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Kepegawaian Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; margin: 40px; background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%); min-height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); max-width: 900px; margin: auto; }
        h2 { color: #333; text-align: center; margin-bottom: 25px; }
        
        .form-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        input { padding: 12px; border: 2px solid #ddd; border-radius: 8px; flex: 1; min-width: 200px; }
        button { padding: 12px 25px; background-color: #6a11cb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        button:hover { background-color: #2575fc; }

        #searchBar { margin-bottom: 20px; width: 100%; box-sizing: border-box; padding: 12px; border: 2px solid #eee; border-radius: 8px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; border-radius: 10px; overflow: hidden; }
        th { background-color: #6a11cb; color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        
        .btn-edit { color: #2ecc71; cursor: pointer; font-weight: 600; margin-right: 15px; }
        .btn-delete { color: #ff4757; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <h2>Data Kepegawaian</h2>
    
    <div class="form-group">
        <input type="text" id="nama" placeholder="Nama Pegawai">
        <input type="text" id="jabatan" placeholder="Jabatan">
        <input type="text" id="foto" placeholder="URL Foto Profil">
        <button onclick="simpanData()" id="btnSave">Simpan</button>
    </div>

    <input type="text" id="searchBar" placeholder="🔍 Cari nama pegawai..." onkeyup="renderTable()">

    <table id="tabelKepegawaian">
        <thead>
            <tr>
                <th>Foto</th>
                <th>Nama Pegawai</th>
                <th>Jabatan</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    let editIndex = -1;

    // Fungsi untuk menambah atau mengupdate data
    function simpanData() {
        let nama = document.getElementById("nama").value;
        let jabatan = document.getElementById("jabatan").value;
        let foto = document.getElementById("foto").value;
        
        if (!nama || !jabatan || !foto) return alert("Harap isi semua kolom!");

        let data = JSON.parse(localStorage.getItem("datakepegawaian") || "[]");

        if (editIndex === -1) {
            data.push({ nama, jabatan, foto });
        } else {
            data[editIndex] = { nama, jabatan, foto };
            editIndex = -1;
            document.getElementById("btnSave").innerText = "Simpan";
        }

        localStorage.setItem("datakepegawaian", JSON.stringify(data));
        document.getElementById("nama").value = "";
        document.getElementById("jabatan").value = "";
        document.getElementById("foto").value = "";
        renderTable();
    }

    // Fungsi menampilkan tabel
    function renderTable() {
        let keyword = document.getElementById("searchBar").value.toLowerCase();
        let tbody = document.querySelector("#tabelKepegawaian tbody");
        tbody.innerHTML = "";
        let data = JSON.parse(localStorage.getItem("datakepegawaian") || "[]");

        data.filter(k => k.nama.toLowerCase().includes(keyword)).forEach((item, index) => {
            tbody.innerHTML += `<tr>
                <td><img src="${item.foto}" width="50" height="50" style="border-radius:50%; object-fit:cover;"></td>
                <td>${item.nama}</td>
                <td>${item.jabatan}</td>
                <td>
                    <span class="btn-edit" onclick="editData(${index})">Edit</span>
                    <span class="btn-delete" onclick="hapusData(${index})">Hapus</span>
                </td>
            </tr>`;
        });
    }

    function editData(index) {
        let data = JSON.parse(localStorage.getItem("datakepegawaian"));
        document.getElementById("nama").value = data[index].nama;
        document.getElementById("jabatan").value = data[index].jabatan;
        document.getElementById("foto").value = data[index].foto;
        editIndex = index;
        document.getElementById("btnSave").innerText = "Update";
    }

    function hapusData(index) {
        if(confirm("Yakin ingin menghapus data ini?")) {
            let data = JSON.parse(localStorage.getItem("datakepegawaian"));
            data.splice(index, 1);
            localStorage.setItem("datakepegawaian", JSON.stringify(data));
            renderTable();
        }
    }

    // Panggil render saat pertama kali dibuka
    renderTable();
</script>
</body>
</html>
